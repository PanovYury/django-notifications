# -- FILE: tox.ini
[tox]
envlist =
    py{310,311}-django{50,51,52}
    py{312,313,314}-django{50,51,52,60}

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
commands =
    coverage run --branch --source=notifications manage.py test
deps =
    coverage
    django50: Django>=5.0,<5.1
    django51: Django>=5.1,<5.2
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1
